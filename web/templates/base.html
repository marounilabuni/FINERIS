<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FINERIS {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold fs-4" href="/">⚡ FINERIS</a>
  <div class="navbar-nav ms-auto">
    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
    <a class="nav-link {% if request.path.startswith('/portfolio') %}active{% endif %}" href="/portfolio">Portfolio</a>
    <a class="nav-link {% if request.path.startswith('/profile') %}active{% endif %}" href="/profile">Profile</a>
    <a class="nav-link {% if request.path.startswith('/analyze') %}active{% endif %}" href="/analyze">Analyze</a>
    <a class="nav-link {% if request.path.startswith('/about') %}active{% endif %}" href="/about">About</a>
  </div>
</nav>

<div class="container py-4" style="max-width: 820px;">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
